<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dra. Léia Demétrio | Harmonização Facial em Florianópolis</title>
    <meta name="description" content="Harmonização facial de alto padrão com resultados naturais e exclusivos. Dra. Léia Demétrio, especialista em Florianópolis.">
    
    <link rel="preload" href="/fonts/playfair-display-400.woff2" as="font" type="font/woff2" crossorigin>
    
    <meta name="author" content="Dra. Léia Demétrio" />
    <link rel="canonical" href="https://draleiademetrio.com.br" />
    
    <style>
      /* CSS CRÍTICO - START */
      body {
        margin: 0;
        background-color: hsl(20, 28%, 5%);
        color: hsl(0, 0%, 98%);
      }
      .critical-hero {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        overflow: hidden;
      }
      .critical-bg-desktop {
        position: absolute;
        inset: 0;
        display: none;
      }
      .critical-bg-mobile {
        position: absolute;
        inset: 0;
        background-color: hsl(20, 28%, 5%);
      }
      @media (min-width: 768px) {
        .critical-bg-desktop { display: block; }
        .critical-bg-mobile { display: none; }
      }
      /* Fim do CSS crítico estritamente necessário para Hero layout size */
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Pré-renderização do Hero para LCP ultra rápido (TBT baixo) -->
      <section class="critical-hero">
        <div class="critical-bg-desktop">
          <picture>
            <source type="image/avif" srcset="/capa-desktop.avif" />
            <img src="/capa-desktop.webp" alt="Dra. Léia Demétrio" style="width:100%; height:100%; object-fit:cover; object-position:center;" fetchpriority="high" loading="eager" decoding="sync" />
          </picture>
          <div style="position:absolute; inset:0; background: linear-gradient(to right, hsl(20, 28%, 5%), hsla(20, 28%, 5%, 0.8), transparent);"></div>
        </div>
        <div class="critical-bg-mobile"></div>
      </section>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
